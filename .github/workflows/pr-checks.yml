name: PR Checks

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.13'

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Validate Python sources
        run: python -m compileall function_app.py src tests

      - name: Validate application imports
        run: python -c "import function_app"

      - name: Run tests
        run: PYTHONPATH=. python -m pytest
