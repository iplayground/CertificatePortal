<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta name="robots" content="noindex, nofollow">
    <title>活動管理 - 文件管理平台 - iPlayground</title>
    <link rel="icon" href="/assets/favicon.png" type="image/png" sizes="32x32">
    <link rel="stylesheet" href="/assets/theme.css">
    <link rel="stylesheet" href="/assets/portal.css">
  </head>
  <body class="portal-embedded-body" data-portal-csrf-token="{{portal_csrf_token}}">
    <main class="embedded-page-shell">
      <section class="content-card embedded-page-card event-management-card">
        <div class="event-management-header">
          <div class="content-section-heading">
            <h1 class="embedded-page-title">活動管理</h1>
            <p class="embedded-page-lead">管理目前活動、活動狀態，以及各活動可申請的文件類型。</p>
          </div>
          <button class="submit-button event-create-button" id="event-create-open" type="button">
            建立活動
          </button>
        </div>

        <div class="event-table-wrap">
          <table class="event-list-table" aria-label="活動清單">
            <colgroup>
              <col class="event-list-col-name">
              <col class="event-list-col-documents">
              <col class="event-list-col-status">
            </colgroup>
            <thead>
              <tr>
                <th scope="col">活動名稱</th>
                <th scope="col">可申請文件</th>
                <th scope="col">狀態</th>
              </tr>
            </thead>
            <tbody id="event-list-body">
              <tr class="document-empty-row">
                <td colspan="3">活動載入中。</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div
          class="event-dialog-backdrop"
          id="event-create-dialog"
          role="dialog"
          aria-modal="true"
          aria-labelledby="event-create-title"
          hidden
        >
          <section class="event-dialog">
            <header class="event-dialog-header">
              <h2 id="event-create-title">建立活動</h2>
              <label class="event-status-switch-option" title="切換為開放">
                <span class="event-status-switch-copy">
                  <span class="event-status-switch-label" id="event-status-label">活動狀態</span>
                  <strong id="event-status-text">下架</strong>
                </span>
                <input
                  class="event-status-switch-input"
                  id="event-status-checkbox"
                  name="eventStatus"
                  type="checkbox"
                  value="open"
                  aria-labelledby="event-status-label event-status-text"
                >
                <span class="event-status-switch-track" aria-hidden="true">
                  <span class="event-status-switch-thumb"></span>
                </span>
              </label>
            </header>

            <form class="event-management-form" aria-label="建立活動">
              <div class="event-form-grid">
                <div class="field event-name-field">
                  <span class="field-label" id="event-name-label">活動名稱</span>
                  <input
                    id="event-name-input"
                    name="eventName"
                    type="text"
                    autocomplete="off"
                    data-1p-ignore="true"
                    data-op-ignore="true"
                    data-lpignore="true"
                    data-bwignore="true"
                    data-protonpass-ignore="true"
                    data-form-type="other"
                    aria-labelledby="event-name-label"
                  >
                </div>
                <div class="field event-date-field">
                  <span class="field-label" id="event-start-date-label">活動開始日期</span>
                  <input
                    class="form-datetime-input"
                    id="event-start-date"
                    name="eventStartDate"
                    type="text"
                    inputmode="numeric"
                    autocomplete="off"
                    aria-labelledby="event-start-date-label"
                    placeholder="---- / -- / --"
                    pattern="[0-9]{4} / [0-9]{2} / [0-9]{2}"
                  >
                </div>
                <div class="field event-date-field">
                  <span class="field-label" id="event-end-date-label">活動結束日期</span>
                  <input
                    class="form-datetime-input"
                    id="event-end-date"
                    name="eventEndDate"
                    type="text"
                    inputmode="numeric"
                    autocomplete="off"
                    aria-labelledby="event-end-date-label"
                    placeholder="---- / -- / --"
                    pattern="[0-9]{4} / [0-9]{2} / [0-9]{2}"
                  >
                </div>
              </div>

              <fieldset class="document-type-fieldset">
                <legend>可申請文件類型</legend>
                <div
                  class="form-checkbox-option document-type-option document-type-option-with-setting"
                  data-completion-document-type-option
                >
                  <label class="document-type-checkbox-control">
                    <input
                      name="documentTypes"
                      type="checkbox"
                      value="completionCert"
                      data-document-type="completionCert"
                      checked
                    >
                    <span>
                      <strong>完訓證明</strong>
                      <small>完成指定活動後開放申請</small>
                    </span>
                  </label>
                  <div class="document-type-setting" id="event-completion-download-setting">
                    <div class="document-type-setting-row">
                      <span class="field-label" id="event-completion-hours-label">完訓總時數</span>
                      <input
                        class="form-datetime-input document-type-hours-input"
                        id="event-completion-hours"
                        name="completionHours"
                        type="text"
                        inputmode="numeric"
                        autocomplete="off"
                        aria-labelledby="event-completion-hours-label"
                        pattern="[0-9]+"
                      >
                    </div>
                    <div class="document-type-setting-row">
                      <span
                        class="field-label document-type-setting-toggle"
                        id="event-completion-download-starts-at-label"
                        role="button"
                        tabindex="0"
                        data-completion-download-toggle
                      >
                        完訓證明開放下載時間
                      </span>
                      <input
                        class="form-datetime-input document-type-datetime-input"
                        id="event-completion-download-starts-at"
                        name="completionCertDownloadStartsAt"
                        type="text"
                        inputmode="numeric"
                        autocomplete="off"
                        aria-labelledby="event-completion-download-starts-at-label"
                        placeholder="---- / -- / -- --:--"
                        pattern="[0-9]{4} / [0-9]{2} / [0-9]{2} ([01][0-9]|2[0-3]):[0-5][0-9]"
                      >
                    </div>
                  </div>
                </div>
                <label class="form-checkbox-option document-type-option">
                  <input
                    name="documentTypes"
                    type="checkbox"
                    value="taxReceipt"
                    data-document-type="taxReceipt"
                  >
                  <span>
                    <strong>營業稅繳稅證明</strong>
                    <small>開放協會 407 收據聯影本供下載</small>
                  </span>
                </label>
              </fieldset>

              <div class="event-form-actions">
                <button class="secondary-button event-cancel-button" id="event-create-cancel" type="button">取消</button>
                <button class="submit-button" id="event-form-submit" type="button" disabled>建立活動</button>
              </div>
            </form>
          </section>
        </div>
      </section>
    </main>

    <script src="/assets/portal-datetime-picker.js"></script>
    <script src="/assets/portal-event-cache.js"></script>
    <script src="/assets/page-alert.js"></script>
    <script src="/assets/portal-dashboard-events.js"></script>
  </body>
</html>
