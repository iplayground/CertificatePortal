<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta name="robots" content="noindex, nofollow">
    <title>文件管理平台 - iPlayground</title>
    <link rel="icon" href="/assets/favicon.png" type="image/png" sizes="32x32">
    <link rel="stylesheet" href="/assets/theme.css">
    <link rel="stylesheet" href="/assets/portal.css">
  </head>
  <body
    class="portal-dashboard-shell"
    data-portal-entry-path="{{portal_entry_path}}"
    data-logout-url="{{portal_logout_url}}"
    data-welcome-page-path="/portal/dashboard/welcome"
    data-portal-csrf-token="{{portal_csrf_token}}"
  >
    <div class="page-shell">
      <main class="portal-stage">
        <section
          class="panel admin-workspace"
          id="portal-dashboard"
          aria-labelledby="portal-dashboard-title"
        >
          <aside class="admin-sidebar">
            <button
              class="sidebar-brand is-active"
              id="sidebar-home"
              type="button"
              data-view-target="welcome"
              data-view-path="/portal/dashboard/welcome"
              aria-pressed="true"
            >
              <img
                class="sidebar-brand-mark"
                src="/assets/logo_sq_b.png"
                alt=""
                aria-hidden="true"
              >
              <span class="sidebar-brand-copy">
                <strong id="portal-dashboard-title">文件管理平台</strong>
              </span>
            </button>

            <div class="sidebar-footer">
              <div class="sidebar-account-panel">
                <span class="admin-account-label">目前登入管理者</span>
                <div class="sidebar-account-row">
                  <strong class="admin-account-value" id="admin-account-display">{{portal_user_display_name}}</strong>
                  <button class="secondary-button" id="portal-logout" type="button">登出</button>
                </div>
              </div>
            </div>

            <div class="sidebar-section">
              <p class="sidebar-label">功能清單</p>
              <nav class="admin-nav" aria-label="管理功能">
                <button
                  class="admin-nav-item"
                  type="button"
                  data-view-target="events"
                  data-view-path="/portal/dashboard/events"
                  aria-pressed="false"
                >
                  <span class="admin-nav-symbol" aria-hidden="true">01</span>
                  <span class="admin-nav-copy">
                    <strong>活動管理</strong>
                    <span>活動與文件設定</span>
                  </span>
                </button>
                <button
                  class="admin-nav-item"
                  type="button"
                  data-view-target="completion-certs"
                  data-view-path="/portal/dashboard/completion-certs"
                  aria-pressed="false"
                >
                  <span class="admin-nav-symbol" aria-hidden="true">02</span>
                  <span class="admin-nav-copy">
                    <strong>完訓證明</strong>
                    <span>清單與資料上傳</span>
                  </span>
                </button>
                <button
                  class="admin-nav-item"
                  type="button"
                  data-view-target="completion-reviews"
                  data-view-path="/portal/dashboard/completion-reviews"
                  aria-pressed="false"
                >
                  <span class="admin-nav-symbol" aria-hidden="true">03</span>
                  <span class="admin-nav-copy">
                    <strong>修改審核</strong>
                    <span>完訓證明申請處理</span>
                  </span>
                </button>
                <button
                  class="admin-nav-item"
                  type="button"
                  data-view-target="tax-receipts"
                  data-view-path="/portal/dashboard/tax-receipts"
                  aria-pressed="false"
                >
                  <span class="admin-nav-symbol" aria-hidden="true">04</span>
                  <span class="admin-nav-copy">
                    <strong>營業稅繳稅證明</strong>
                    <span>PDF/圖檔上傳與管理</span>
                  </span>
                </button>
              </nav>
            </div>
          </aside>

          <div class="admin-content-shell">
            <iframe
              class="admin-content-frame"
              id="admin-content-frame"
              title="管理者中心內容頁"
              src="/portal/dashboard/welcome"
            ></iframe>
          </div>
        </section>
      </main>
    </div>

    <div
      class="event-dialog-backdrop portal-event-dialog-backdrop"
      id="portal-event-create-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="portal-event-create-title"
      hidden
    >
      <section class="event-dialog portal-event-dialog">
        <header class="event-dialog-header">
          <h2 id="portal-event-create-title">建立活動</h2>
          <label class="event-status-switch-option" title="切換為開放">
            <span class="event-status-switch-copy">
              <span class="event-status-switch-label" id="portal-event-status-label">活動狀態</span>
              <strong id="portal-event-status-text">下架</strong>
            </span>
            <input
              class="event-status-switch-input"
              id="portal-event-status-checkbox"
              name="eventStatus"
              type="checkbox"
              value="open"
              aria-labelledby="portal-event-status-label portal-event-status-text"
            >
            <span class="event-status-switch-track" aria-hidden="true">
              <span class="event-status-switch-thumb"></span>
            </span>
          </label>
        </header>

        <form class="event-management-form" aria-label="建立活動">
          <div class="event-form-grid">
            <div class="field event-name-field">
              <span class="field-label" id="portal-event-name-label">活動名稱</span>
              <input
                id="portal-event-name-input"
                name="eventName"
                type="text"
                autocomplete="off"
                data-1p-ignore="true"
                data-op-ignore="true"
                data-lpignore="true"
                data-bwignore="true"
                data-protonpass-ignore="true"
                data-form-type="other"
                aria-labelledby="portal-event-name-label"
              >
            </div>
            <div class="field event-date-field">
              <span class="field-label" id="portal-event-start-date-label">活動開始日期</span>
              <input
                class="form-datetime-input"
                id="portal-event-start-date"
                name="eventStartDate"
                type="text"
                inputmode="numeric"
                autocomplete="off"
                aria-labelledby="portal-event-start-date-label"
                placeholder="---- / -- / --"
                pattern="[0-9]{4} / [0-9]{2} / [0-9]{2}"
              >
            </div>
            <div class="field event-date-field">
              <span class="field-label" id="portal-event-end-date-label">活動結束日期</span>
              <input
                class="form-datetime-input"
                id="portal-event-end-date"
                name="eventEndDate"
                type="text"
                inputmode="numeric"
                autocomplete="off"
                aria-labelledby="portal-event-end-date-label"
                placeholder="---- / -- / --"
                pattern="[0-9]{4} / [0-9]{2} / [0-9]{2}"
              >
            </div>
          </div>

          <fieldset class="document-type-fieldset">
            <legend>可申請文件類型</legend>
            <div
              class="form-checkbox-option document-type-option document-type-option-with-setting"
              data-completion-document-type-option
            >
              <label class="document-type-checkbox-control">
                <input
                  name="documentTypes"
                  type="checkbox"
                  value="completionCert"
                  data-document-type="completionCert"
                  checked
                >
                <span>
                  <strong>完訓證明</strong>
                  <small>完成指定活動後開放申請</small>
                </span>
              </label>
              <div class="document-type-setting" id="portal-event-completion-download-setting">
                <div class="document-type-setting-row">
                  <span class="field-label" id="portal-event-completion-hours-label">完訓總時數</span>
                  <input
                    class="form-datetime-input document-type-hours-input"
                    id="portal-event-completion-hours"
                    name="completionHours"
                    type="text"
                    inputmode="numeric"
                    autocomplete="off"
                    aria-labelledby="portal-event-completion-hours-label"
                    pattern="[0-9]+"
                  >
                </div>
                <div class="document-type-setting-row">
                  <span
                    class="field-label document-type-setting-toggle"
                    id="portal-event-completion-download-starts-at-label"
                    role="button"
                    tabindex="0"
                    data-completion-download-toggle
                  >
                    完訓證明開放下載時間
                  </span>
                  <input
                    class="form-datetime-input document-type-datetime-input"
                    id="portal-event-completion-download-starts-at"
                    name="completionCertDownloadStartsAt"
                    type="text"
                    inputmode="numeric"
                    autocomplete="off"
                    aria-labelledby="portal-event-completion-download-starts-at-label"
                    placeholder="---- / -- / -- --:--"
                    pattern="[0-9]{4} / [0-9]{2} / [0-9]{2} ([01][0-9]|2[0-3]):[0-5][0-9]"
                  >
                </div>
              </div>
            </div>
            <label class="form-checkbox-option document-type-option">
              <input
                name="documentTypes"
                type="checkbox"
                value="taxReceipt"
                data-document-type="taxReceipt"
              >
              <span>
                <strong>營業稅繳稅證明</strong>
                <small>開放協會 407 收據聯影本供下載</small>
              </span>
            </label>
          </fieldset>

          <div class="event-form-actions">
            <button class="secondary-button event-cancel-button" id="portal-event-create-cancel" type="button">取消</button>
            <button class="submit-button" id="portal-event-form-submit" type="button" disabled>建立活動</button>
          </div>
        </form>
      </section>
    </div>

    <div
      class="event-dialog-backdrop portal-event-dialog-backdrop"
      id="portal-completion-upload-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="portal-completion-upload-title"
      hidden
    >
      <section class="event-dialog portal-event-dialog">
        <header class="event-dialog-header">
          <h2 id="portal-completion-upload-title">上傳完訓證明資料</h2>
        </header>

        <form class="document-upload-form" aria-label="上傳完訓證明資料">
          <div class="field">
            <span class="field-label" id="portal-completion-upload-event-label">活動</span>
            <input
              id="portal-completion-upload-event"
              name="eventName"
              type="hidden"
              value=""
            >
            <div class="field-static-value" id="portal-completion-upload-event-value">尚無活動資料</div>
          </div>

          <label class="document-upload-dropzone" for="portal-completion-upload-file">
            <span class="document-upload-icon" aria-hidden="true">CSV</span>
            <span class="document-upload-copy">
              <strong>選擇完訓證明 CSV</strong>
              <small>僅支援 CSV 檔案；實際匯入流程將在後續串接。</small>
              <span class="document-upload-file-name" id="portal-completion-upload-file-name">
                尚未選擇 CSV 檔案
              </span>
            </span>
            <input
              class="document-upload-input"
              id="portal-completion-upload-file"
              name="completionUploadFile"
              type="file"
              accept=".csv,text/csv"
            >
          </label>

          <section
            class="completion-upload-mapping"
            id="portal-completion-upload-mapping"
            aria-labelledby="portal-completion-upload-mapping-title"
            hidden
          >
            <h3 id="portal-completion-upload-mapping-title">配對 CSV 欄位</h3>
            <p class="completion-upload-mapping-summary" id="portal-completion-upload-mapping-summary"></p>
            <div class="completion-upload-mapping-grid" id="portal-completion-upload-mapping-fields"></div>
          </section>

          <div
            class="document-upload-errors"
            id="portal-completion-upload-errors"
            role="status"
            aria-live="polite"
            hidden
          ></div>

          <div class="event-form-actions">
            <button class="secondary-button event-cancel-button" id="portal-completion-upload-cancel" type="button">取消</button>
            <button class="submit-button" id="portal-completion-upload-submit" type="button">上傳完訓證明資料</button>
          </div>
        </form>
      </section>
    </div>

    <div
      class="event-dialog-backdrop portal-event-dialog-backdrop"
      id="portal-tax-upload-dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="portal-tax-upload-title"
      hidden
    >
      <section class="event-dialog portal-event-dialog">
        <header class="event-dialog-header">
          <h2 id="portal-tax-upload-title">新增繳稅證明</h2>
        </header>

        <form class="document-upload-form" aria-label="新增營業稅繳稅證明">
          <div class="field">
            <span class="field-label" id="portal-tax-upload-event-label">活動</span>
            <input
              id="portal-tax-upload-event"
              name="eventName"
              type="hidden"
              value=""
            >
            <div class="field-static-value" id="portal-tax-upload-event-value">尚無活動資料</div>
          </div>

          <div class="document-detail-grid">
            <div class="field">
              <label class="field-label" for="portal-tax-upload-tax-id">統編</label>
              <input
                id="portal-tax-upload-tax-id"
                name="taxId"
                type="text"
                autocomplete="off"
                data-1p-ignore="true"
                data-op-ignore="true"
                data-lpignore="true"
                data-bwignore="true"
                data-protonpass-ignore="true"
                data-form-type="other"
              >
            </div>
            <div class="field">
              <label class="field-label" for="portal-tax-upload-amount">金額</label>
              <input
                id="portal-tax-upload-amount"
                name="amount"
                type="text"
                inputmode="decimal"
                autocomplete="off"
                data-1p-ignore="true"
                data-op-ignore="true"
                data-lpignore="true"
                data-bwignore="true"
                data-protonpass-ignore="true"
                data-form-type="other"
              >
            </div>
            <div class="field">
              <label class="field-label" for="portal-tax-upload-generated-at">產製時間</label>
              <input
                class="form-datetime-input"
                id="portal-tax-upload-generated-at"
                name="generatedAt"
                type="text"
                inputmode="numeric"
                autocomplete="off"
                placeholder="---- / -- / -- --:--:--"
                pattern="[0-9]{4} / [0-9]{2} / [0-9]{2} ([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]"
                data-1p-ignore="true"
                data-op-ignore="true"
                data-lpignore="true"
                data-bwignore="true"
                data-protonpass-ignore="true"
                data-form-type="other"
              >
            </div>
          </div>

          <label class="document-upload-dropzone" for="portal-tax-upload-file">
            <span class="document-upload-icon" aria-hidden="true">PDF</span>
            <span class="document-upload-copy">
              <strong>拖曳或選擇 PDF、PNG、JPG</strong>
              <small>每次新增一筆資料，可將檔案拖曳到這裡。</small>
              <span class="document-upload-file-name" id="portal-tax-upload-file-name">
                尚未選擇 PDF 或圖檔
              </span>
            </span>
            <input
              class="document-upload-input"
              id="portal-tax-upload-file"
              name="taxReceiptUploadFile"
              type="file"
              accept=".pdf,application/pdf,image/png,image/jpeg,.png,.jpg,.jpeg"
            >
          </label>

          <div
            class="document-upload-errors"
            id="portal-tax-upload-errors"
            role="status"
            aria-live="polite"
            hidden
          ></div>

          <div class="event-form-actions">
            <button class="secondary-button event-cancel-button" id="portal-tax-upload-cancel" type="button">取消</button>
            <button class="submit-button" id="portal-tax-upload-submit" type="button">新增繳稅證明</button>
            <label class="form-checkbox-option document-upload-continue-option" id="portal-tax-upload-continue-option">
              <input
                id="portal-tax-upload-continue"
                name="continueUploading"
                type="checkbox"
              >
              <span>
                <strong>還有其他檔案要上傳</strong>
              </span>
            </label>
          </div>
        </form>
      </section>
    </div>

    <script src="/assets/portal-datetime-picker.js"></script>
    <script src="/assets/portal-event-cache.js"></script>
    <script src="/assets/portal-dashboard.js"></script>
  </body>
</html>
