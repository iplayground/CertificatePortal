<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta name="robots" content="noindex, nofollow">
    <title>完訓證明管理平台 - iPlayground</title>
    <link rel="icon" href="/assets/favicon.png" type="image/png" sizes="32x32">
    <link rel="stylesheet" href="/assets/theme.css">
    <link rel="stylesheet" href="/assets/portal.css">
  </head>
  <body
    class="portal-embedded-body"
  >
    <main class="embedded-page-shell">
      <header class="admin-header">
        <div class="admin-header-copy">
          <div class="welcome-brand-row">
            <img class="brand-logo" src="/assets/logo_b_alpha.png" alt="iPlayground">
          </div>
          <h1 class="admin-header-title">完訓證明管理平台</h1>
        </div>
      </header>

      <section class="welcome-hero">
        <div class="welcome-copy">
          <h2>
            歡迎回來，
            <span id="welcome-account-display">{{portal_user_display_name}}</span>
          </h2>
          <p>
            你可以在這裡上傳完訓名單、追蹤批次處理結果，並管理完訓證明的發行與下載狀態。
          </p>
        </div>
      </section>

      <div class="metric-grid">
        <article class="content-card metric-card">
          <span class="metric-label">系統可下載數</span>
          <strong class="metric-value">128</strong>
          <p class="metric-note">目前已完成檔案建立並可提供下載的證明數量</p>
        </article>
        <article class="content-card metric-card">
          <span class="metric-label">下載人數</span>
          <strong class="metric-value">18</strong>
          <p class="metric-note">近期已完成證明下載的會員人數統計</p>
        </article>
        <article class="content-card metric-card">
          <span class="metric-label">驗證次數</span>
          <strong class="metric-value">46</strong>
          <p class="metric-note">公開驗證頁面累計收到的查詢次數</p>
        </article>
        <article class="content-card metric-card">
          <span class="metric-label">待處理案件數量</span>
          <strong class="metric-value">3</strong>
          <p class="metric-note">尚待匯入、發證或補件確認的案件總數</p>
        </article>
      </div>
    </main>

    <script src="/assets/portal-dashboard-welcome.js"></script>
  </body>
</html>
