<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta name="robots" content="noindex, nofollow">
    <title>完訓證明管理平台 - iPlayground</title>
    <link rel="icon" href="/assets/favicon.png" type="image/png" sizes="32x32">
    <link rel="stylesheet" href="/assets/theme.css">
    <link rel="stylesheet" href="/assets/portal.css">
  </head>
  <body>
    {{{page_alert_html}}}
    <div class="page-shell">
      <main class="portal-stage">
        <section class="panel portal-card" id="portal-login-view" aria-labelledby="portal-title">
          <div class="brand-lockup">
            <img class="brand-logo" src="/assets/logo_b_alpha.png" alt="iPlayground">
          </div>

          <div class="portal-copy">
            <h1 id="portal-title">完訓證明管理平台</h1>
          </div>

          <div class="portal-form-shell">
            <p class="panel-kicker">{{portal_panel_kicker}}</p>
            {{{portal_lead_html}}}
            {{{portal_feedback_html}}}
            {{{portal_identity_html}}}
            <div class="portal-auth-actions">
              {{{portal_primary_action_html}}}
              {{{portal_secondary_action_html}}}
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/assets/page-alert.js"></script>
    <script src="/assets/portal-login.js"></script>
  </body>
</html>
