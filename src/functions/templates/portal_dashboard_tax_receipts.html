<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta name="robots" content="noindex, nofollow">
    <title>營業稅繳稅證明 - 文件管理平台 - iPlayground</title>
    <link rel="icon" href="{{asset_favicon_png_url}}" type="image/png" sizes="32x32">
    <link rel="stylesheet" href="{{asset_theme_css_url}}">
    <link rel="stylesheet" href="{{asset_portal_css_url}}">
  </head>
  <body class="portal-embedded-body" data-portal-csrf-token="{{portal_csrf_token}}">
    <main class="embedded-page-shell">
      <section class="content-card embedded-page-card document-workspace-card">
        <div class="event-management-header">
          <div class="content-section-heading">
            <h1 class="embedded-page-title">營業稅繳稅證明</h1>
            <p class="embedded-page-lead">檢視已新增的營業稅繳稅證明，並逐筆上傳 PDF 或圖檔。</p>
          </div>
          <button class="submit-button event-create-button" id="tax-upload-open" type="button">
            新增繳稅證明
          </button>
        </div>

        <form class="document-filter-form tax-receipt-filter-form" aria-label="營業稅繳稅證明篩選">
          <div class="field">
            <span class="field-label" id="tax-event-filter-label">活動</span>
            <input id="tax-event-filter" name="eventName" type="hidden" value="">
            <div class="field-static-value" id="tax-event-filter-value">尚無活動資料</div>
          </div>
          <label class="field" for="tax-id-filter">
            <span class="field-label">搜尋統編</span>
            <input id="tax-id-filter" name="taxId" type="search" inputmode="numeric" autocomplete="off" placeholder="輸入統編">
          </label>
        </form>

        <div class="document-table-wrap">
          <table class="document-list-table tax-receipt-table" aria-label="營業稅繳稅證明清單">
            <thead>
              <tr>
                <th class="tax-receipt-col-tax-id" scope="col">統編</th>
                <th class="tax-receipt-col-generated-at" scope="col">產製時間</th>
                <th class="tax-receipt-col-amount" scope="col">金額</th>
                <th class="tax-receipt-col-actions" scope="col">操作</th>
              </tr>
            </thead>
            <tbody id="tax-receipt-table-body">
              <tr class="document-empty-row" id="tax-receipt-empty-row">
                <td colspan="4">營業稅繳稅證明資料載入中...</td>
              </tr>
            </tbody>
          </table>
          <template id="tax-receipt-row-template">
            <tr class="tax-receipt-row">
              <td data-field="taxId"></td>
              <td data-field="generatedAt"></td>
              <td data-field="amount"></td>
              <td>
                <div class="document-row-actions">
                  <button class="secondary-button document-download-button" type="button">
                    <span class="document-file-icon" aria-hidden="true"></span>
                    <span>下載</span>
                  </button>
                  <button class="secondary-button document-edit-button" type="button">修改</button>
                  <button class="secondary-button document-delete-button" type="button">刪除</button>
                </div>
              </td>
            </tr>
          </template>
        </div>

        <nav class="document-pagination" id="tax-receipt-pagination" aria-label="營業稅繳稅證明清單分頁" hidden>
          <button class="secondary-button document-page-button" id="tax-receipt-page-prev" type="button">
            上一頁
          </button>
          <span class="document-page-status" id="tax-receipt-page-status" aria-live="polite">
            第 1 / 1 頁
          </span>
          <button class="secondary-button document-page-button" id="tax-receipt-page-next" type="button">
            下一頁
          </button>
        </nav>

        <div
          class="event-dialog-backdrop"
          id="tax-upload-dialog"
          role="dialog"
          aria-modal="true"
          aria-labelledby="tax-upload-title"
          hidden
        >
          <section class="event-dialog">
            <header class="event-dialog-header">
              <h2 id="tax-upload-title">新增繳稅證明</h2>
            </header>

            <form class="document-upload-form" aria-label="新增營業稅繳稅證明">
              <div class="field">
                <span class="field-label" id="tax-upload-event-label">活動</span>
                <input id="tax-upload-event" name="eventName" type="hidden" value="">
                <div class="field-static-value" id="tax-upload-event-value">尚無活動資料</div>
              </div>

              <div class="document-detail-grid">
                <div class="field">
                  <label class="field-label" for="tax-upload-tax-id">統編</label>
                  <input
                    id="tax-upload-tax-id"
                    name="taxId"
                    type="text"
                    autocomplete="off"
                    data-1p-ignore="true"
                    data-op-ignore="true"
                    data-lpignore="true"
                    data-bwignore="true"
                    data-protonpass-ignore="true"
                    data-form-type="other"
                  >
                </div>
                <div class="field">
                  <label class="field-label" for="tax-upload-amount">金額</label>
                  <input
                    id="tax-upload-amount"
                    name="amount"
                    type="text"
                    inputmode="decimal"
                    autocomplete="off"
                    data-1p-ignore="true"
                    data-op-ignore="true"
                    data-lpignore="true"
                    data-bwignore="true"
                    data-protonpass-ignore="true"
                    data-form-type="other"
                  >
                </div>
                <div class="field">
                  <label class="field-label" for="tax-upload-generated-at">產製時間</label>
                  <input
                    class="form-datetime-input"
                    id="tax-upload-generated-at"
                    name="generatedAt"
                    type="text"
                    inputmode="numeric"
                    autocomplete="off"
                    placeholder="---- / -- / -- --:--:--"
                    pattern="[0-9]{4} / [0-9]{2} / [0-9]{2} ([01][0-9]|2[0-3]):[0-5][0-9]:[0-5][0-9]"
                    data-1p-ignore="true"
                    data-op-ignore="true"
                    data-lpignore="true"
                    data-bwignore="true"
                    data-protonpass-ignore="true"
                    data-form-type="other"
                  >
                </div>
              </div>

              <label class="document-upload-dropzone" for="tax-upload-file">
                <span class="document-upload-icon" aria-hidden="true">PDF</span>
                <span class="document-upload-copy">
                  <strong>拖曳或選擇 PDF、PNG、JPG</strong>
                  <small>每次新增一筆資料，可將檔案拖曳到這裡。</small>
                  <span class="document-upload-file-name" id="tax-upload-file-name">
                    尚未選擇 PDF 或圖檔
                  </span>
                </span>
                <input
                  class="document-upload-input"
                  id="tax-upload-file"
                  name="taxReceiptUploadFile"
                  type="file"
                  accept=".pdf,application/pdf,image/png,image/jpeg,.png,.jpg,.jpeg"
                >
              </label>

              <div
                class="document-upload-errors"
                id="tax-upload-errors"
                role="status"
                aria-live="polite"
                hidden
              ></div>

              <div class="event-form-actions">
                <button class="secondary-button event-cancel-button" id="tax-upload-cancel" type="button">取消</button>
                <button class="submit-button" id="tax-upload-submit" type="button">新增繳稅證明</button>
                <label class="form-checkbox-option document-upload-continue-option" id="tax-upload-continue-option">
                  <input
                    id="tax-upload-continue"
                    name="continueUploading"
                    type="checkbox"
                  >
                  <span>
                    <strong>還有其他檔案要上傳</strong>
                  </span>
                </label>
              </div>
            </form>
          </section>
        </div>
      </section>
    </main>

    <script src="{{asset_portal_datetime_picker_js_url}}"></script>
    <script src="{{asset_portal_event_cache_js_url}}"></script>
    <script src="{{asset_page_alert_js_url}}"></script>
    <script src="{{asset_portal_dashboard_tax_receipts_js_url}}"></script>
  </body>
</html>
