<!DOCTYPE html>
<html lang="{{html_lang}}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{page_title}}</title>
    <link rel="stylesheet" href="/assets/home.css">
  </head>
  <body
    data-current-locale="{{current_locale}}"
    data-empty-name-text="{{empty_name_text}}"
    data-empty-email-text="{{empty_email_text}}"
    data-preview-feedback-template="{{preview_feedback_template}}"
    data-locale-cookie-name="{{locale_cookie_name}}"
    data-locale-cookie-max-age="{{locale_cookie_max_age}}"
  >
    <div class="shell">
      <main class="hero">
        <section class="panel hero-card" aria-labelledby="page-title">
          <div class="page-toolbar">
            <div class="locale-switcher" id="locale-switcher">
              <button
                class="locale-trigger"
                id="locale-trigger"
                type="button"
                aria-label="{{locale_switcher_label}}"
                aria-expanded="false"
                aria-haspopup="listbox"
                aria-controls="locale-options"
              >
                <span class="locale-trigger-icon" aria-hidden="true"></span>
                <span class="locale-trigger-value">{{current_locale_label}}</span>
              </button>
              <div class="locale-menu" id="locale-options" role="listbox" hidden>{{{locale_options_html}}}</div>
            </div>
          </div>

          <div class="brand-row">
            <img class="brand-logo" src="/assets/logo_b_alpha.png" alt="iPlayground">
          </div>

          <div class="hero-copy">
            <div class="eyebrow" id="eyebrow">{{eyebrow}}</div>
            <h1 id="page-title">{{hero_title}}</h1>
            <p class="lead" id="hero-lead">{{hero_lead}}</p>
          </div>

          <div class="hero-form-shell">
            <h2 class="form-title" id="form-title">{{form_title}}</h2>
            <p class="form-subtitle" id="form-subtitle">{{form_subtitle}}</p>

            <form id="document-request-form">
              <div class="field">
                <span id="event-name-label" class="field-label">{{event_name_label}}</span>
                <div class="custom-select" id="event-name-select">
                  <input id="event-name" name="eventName" type="hidden" value="iPlayground 2026">
                  <button
                    class="custom-select-trigger"
                    id="event-name-trigger"
                    type="button"
                    aria-expanded="false"
                    aria-haspopup="listbox"
                    aria-controls="event-name-options"
                    aria-labelledby="event-name-label event-name-value"
                  >
                    <span id="event-name-value" class="custom-select-value">iPlayground 2026</span>
                    <span class="select-caret" aria-hidden="true"></span>
                  </button>
                  <div class="custom-select-menu" id="event-name-options" role="listbox" hidden>
                    <button
                      class="custom-select-option is-selected"
                      type="button"
                      role="option"
                      aria-selected="true"
                      data-value="iPlayground 2026"
                    >
                      iPlayground 2026
                    </button>
                  </div>
                </div>
                <div id="event-name-hint" class="hint">{{event_name_hint}}</div>
              </div>

              <div class="field">
                <span id="attendee-name-label" class="field-label">{{attendee_name_label}}</span>
                <input
                  id="attendee-name"
                  name="attendeeName"
                  type="text"
                  autocomplete="name"
                  aria-labelledby="attendee-name-label"
                  placeholder="{{attendee_name_placeholder}}"
                >
              </div>

              <div class="field">
                <span id="email-label" class="field-label">{{email_label}}</span>
                <input
                  id="email"
                  name="email"
                  type="email"
                  autocomplete="email"
                  inputmode="email"
                  aria-labelledby="email-label"
                  placeholder="{{email_placeholder}}"
                >
              </div>

              <div class="form-actions">
                <button class="primary-action" type="button" id="preview-action">{{preview_action_label}}</button>
                <div class="secondary-note" id="secondary-note">{{secondary_note}}</div>
              </div>

              <div id="form-feedback" class="feedback" role="status" aria-live="polite">{{form_feedback_initial}}</div>
            </form>

            <p class="footnote" id="footnote">{{footnote}}</p>
          </div>
        </section>
      </main>

      <footer class="site-footer">
        <small id="copyright-notice">{{copyright_notice}}</small>
      </footer>
    </div>

    <script id="home-page-i18n" type="application/json">{{{home_page_i18n_json}}}</script>
    <script src="/assets/home.js"></script>
  </body>
</html>
