<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <meta name="robots" content="noindex, nofollow">
    <title>完訓證明 - 文件管理平台 - iPlayground</title>
    <link rel="icon" href="/assets/favicon.png" type="image/png" sizes="32x32">
    <link rel="stylesheet" href="/assets/theme.css">
    <link rel="stylesheet" href="/assets/portal.css">
  </head>
  <body class="portal-embedded-body" data-portal-csrf-token="{{portal_csrf_token}}">
    <main class="embedded-page-shell">
      <section class="content-card embedded-page-card document-workspace-card">
        <div class="event-management-header">
          <div class="content-section-heading">
            <h1 class="embedded-page-title">完訓證明</h1>
            <p class="embedded-page-lead">檢視已匯入的完訓證明資料，並上傳新的完訓證明資料檔。</p>
          </div>
          <button class="submit-button event-create-button" id="completion-upload-open" type="button">
            上傳完訓證明資料
          </button>
        </div>

        <form class="document-filter-form" aria-label="完訓證明資料篩選">
          <div class="field">
            <span class="field-label" id="completion-event-filter-label">活動</span>
            <input id="completion-event-filter" name="eventName" type="hidden" value="">
            <div class="field-static-value" id="completion-event-filter-value">尚無活動資料</div>
          </div>
        </form>

        <div class="document-bulk-toolbar" id="completion-bulk-toolbar" aria-label="完訓證明批次操作">
          <span class="document-bulk-scope">套用至目前活動全部資料</span>
          <div class="document-bulk-actions">
            <button class="secondary-button document-bulk-action" id="completion-bulk-downloadable" type="button" disabled>
              設為已簽到
            </button>
            <button class="secondary-button document-bulk-action" id="completion-bulk-blocked" type="button" disabled>
              設為未簽到
            </button>
          </div>
        </div>

        <div class="document-table-wrap">
          <table class="document-list-table completion-cert-table" aria-label="完訓證明資料清單">
            <colgroup>
              <col class="completion-cert-col-number">
              <col class="completion-cert-col-id">
              <col class="completion-cert-col-badge">
              <col class="completion-cert-col-name">
              <col class="completion-cert-col-organization">
              <col class="completion-cert-col-email">
              <col class="completion-cert-col-ticket">
              <col class="completion-cert-col-status">
              <col class="completion-cert-col-actions">
            </colgroup>
            <thead>
              <tr>
                <th scope="col">報名序號</th>
                <th scope="col">ID</th>
                <th scope="col">Badge Name</th>
                <th scope="col">姓名</th>
                <th scope="col">公司名</th>
                <th scope="col">Email</th>
                <th scope="col">票種</th>
                <th scope="col">簽到狀態</th>
                <th scope="col">操作</th>
              </tr>
            </thead>
            <tbody id="completion-cert-table-body">
              <tr class="document-empty-row" id="completion-cert-empty-row">
                <td colspan="9">完訓證明資料載入中...</td>
              </tr>
            </tbody>
          </table>
          <template id="completion-cert-row-template">
            <tr class="completion-cert-row">
              <td data-field="number"></td>
              <td data-field="kktixId"></td>
              <td data-field="badgeName"></td>
              <td data-field="name"></td>
              <td data-field="organization"></td>
              <td data-field="email"></td>
              <td data-field="ticketName"></td>
              <td data-field="status">
                <label class="event-status-switch-option document-row-status-switch">
                  <input
                    class="event-status-switch-input document-download-switch-input"
                    type="checkbox"
                    data-action="toggle-downloadable"
                    aria-label="切換簽到狀態"
                  >
                  <span class="event-status-switch-track" aria-hidden="true">
                    <span class="event-status-switch-thumb"></span>
                  </span>
                </label>
              </td>
              <td>
                <span class="document-row-actions">
                  <button class="secondary-button document-download-button" type="button">下載</button>
                  <button class="secondary-button document-edit-button" type="button">修改</button>
                </span>
              </td>
            </tr>
          </template>
        </div>

        <nav class="document-pagination" id="completion-pagination" aria-label="完訓證明清單分頁" hidden>
          <button class="secondary-button document-page-button" id="completion-page-prev" type="button">
            上一頁
          </button>
          <span class="document-page-status" id="completion-page-status" aria-live="polite">
            第 1 / 1 頁
          </span>
          <button class="secondary-button document-page-button" id="completion-page-next" type="button">
            下一頁
          </button>
        </nav>

        <div
          class="event-dialog-backdrop"
          id="completion-upload-dialog"
          role="dialog"
          aria-modal="true"
          aria-labelledby="completion-upload-title"
          hidden
        >
          <section class="event-dialog">
            <header class="event-dialog-header">
              <h2 id="completion-upload-title">上傳完訓證明資料</h2>
            </header>

            <form class="document-upload-form" aria-label="上傳完訓證明資料">
              <div class="field">
                <span class="field-label" id="completion-upload-event-label">活動</span>
                <input id="completion-upload-event" name="eventName" type="hidden" value="">
                <div class="field-static-value" id="completion-upload-event-value">尚無活動資料</div>
              </div>

              <label class="document-upload-dropzone" for="completion-upload-file">
                <span class="document-upload-icon" aria-hidden="true">CSV</span>
                <span class="document-upload-copy">
                  <strong>選擇完訓證明 CSV</strong>
                  <small>僅支援 CSV 檔案；實際匯入流程將在後續串接。</small>
                  <span class="document-upload-file-name" id="completion-upload-file-name">
                    尚未選擇 CSV 檔案
                  </span>
                </span>
                <input
                  class="document-upload-input"
                  id="completion-upload-file"
                  name="completionUploadFile"
                  type="file"
                  accept=".csv,text/csv"
                >
              </label>

              <div
                class="document-upload-errors"
                id="completion-upload-errors"
                role="status"
                aria-live="polite"
                hidden
              ></div>

              <div class="event-form-actions">
                <button class="secondary-button event-cancel-button" id="completion-upload-cancel" type="button">取消</button>
                <button class="submit-button" id="completion-upload-submit" type="button">上傳完訓證明資料</button>
              </div>
            </form>
          </section>
        </div>

        <div
          class="event-dialog-backdrop"
          id="completion-edit-dialog"
          role="dialog"
          aria-modal="true"
          aria-labelledby="completion-edit-title"
          hidden
        >
          <section class="event-dialog">
            <header class="event-dialog-header">
              <h2 id="completion-edit-title">修改完訓證明資料</h2>
            </header>

            <form class="event-form" aria-label="修改完訓證明資料">
              <div class="completion-edit-identity-row">
                <div class="field completion-edit-number-field">
                  <span class="field-label">報名序號</span>
                  <div class="field-static-value" id="completion-edit-number">-</div>
                </div>

                <div class="field">
                  <span class="field-label">ID</span>
                  <div class="field-static-value" id="completion-edit-kktix-id">-</div>
                </div>

                <div class="field">
                  <span class="field-label">票種</span>
                  <div class="field-static-value" id="completion-edit-ticket-name">-</div>
                </div>
              </div>

              <div class="field">
                <span class="field-label">Badge Name</span>
                <div class="field-static-value" id="completion-edit-badge-name">-</div>
              </div>

              <label class="field">
                <span class="field-label">姓名</span>
                <input id="completion-edit-name" name="completionEditName" type="text" autocomplete="off" data-1p-ignore data-lpignore="true" data-form-type="other">
              </label>

              <label class="field">
                <span class="field-label">公司名</span>
                <input id="completion-edit-organization" name="organization" type="text" autocomplete="organization">
              </label>

              <label class="field">
                <span class="field-label">Email</span>
                <input id="completion-edit-email" name="completionEditEmail" type="email" autocomplete="off" data-1p-ignore data-lpignore="true" data-form-type="other">
              </label>

              <div class="form-feedback is-error" id="completion-edit-feedback" role="status" aria-live="polite" hidden></div>

              <div class="event-form-actions">
                <button class="secondary-button event-cancel-button" id="completion-edit-cancel" type="button">取消</button>
                <button class="submit-button" id="completion-edit-submit" type="button">儲存修改</button>
              </div>
            </form>
          </section>
        </div>
      </section>
    </main>

    <script src="/assets/portal-event-cache.js"></script>
    <script src="/assets/page-alert.js"></script>
    <script src="/assets/portal-dashboard-completion-certs.js"></script>
  </body>
</html>
